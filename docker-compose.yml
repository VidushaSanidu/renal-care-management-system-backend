services:
  mongodb:
    image: mongo:7
    container_name: renal-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-renal-care-db}
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:22-alpine
    container_name: renal-backend
    working_dir: /app
    depends_on:
      - mongodb

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "5000:5000"

    env_file:
      - .env

    command: npm run dev
    restart: unless-stopped

volumes:
  mongo_data:
